<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DuroTube</title>

<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css"/>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
}

/* HEADER */
header{
  display:flex;
  gap:10px;
  padding:12px;
  background:#181818;
  border-bottom:1px solid #222;
}
.logo{font-weight:bold}
#search{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#121212;
  color:white;
}

/* GRID */
#app{display:flex}
#grid{
  flex:1;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  gap:12px;
  padding:12px;
}

.card{cursor:pointer}
.thumb{
  width:100%;
  aspect-ratio:16/9;
  object-fit:cover;
  border-radius:10px;
}
.title{font-size:13px;margin-top:5px}
.meta{font-size:12px;color:#aaa}

/* SIDEBAR */
#sidebar{
  width:320px;
  background:#111;
  border-left:1px solid #222;
  padding:12px;
  display:none;
}
.recCard{margin-bottom:12px;cursor:pointer}
.recThumb{width:100%;border-radius:8px}
.recTitle{font-size:12px;margin-top:4px}

/* WATCH PAGE */
#watchContainer{
  max-width:900px;
  margin:0 auto;
  padding:12px;
  display:none;
}

#player{
  width:100%;
  max-height:60vh;
  border-radius:12px;
}

#title{
  font-size:20px;
  font-weight:600;
  margin-top:12px;
  margin-bottom:8px;
}

#videoInfo{
  margin-top:10px;
  padding:12px;
  background:#111;
  border-radius:10px;
  font-size:13px;
}
.infoRow{color:#aaa;margin-bottom:5px}
.desc{margin-top:10px;color:#ddd}

#back{
  margin-top:12px;
  color:#3ea6ff;
  cursor:pointer;
}

/* LOADER */
#loader{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.85);
}
.spinner{
  width:48px;
  height:48px;
  border:4px solid #333;
  border-top:4px solid #3ea6ff;
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin{100%{transform:rotate(360deg)}}
</style>
</head>

<body>

<header>
  <div class="logo">DuroTube</div>
  <input id="search" placeholder="Search videos...">
</header>

<div id="loader"><div class="spinner"></div></div>

<div id="app">
  <div id="grid"></div>

  <div id="sidebar">
    <div style="color:#aaa;margin-bottom:10px;">Recommended</div>
    <div id="recs"></div>
  </div>
</div>

<div id="watchContainer">
  <video id="player" controls></video>

  <div id="title"></div>

  <div id="videoInfo"></div>

  <div id="back">← Back</div>
</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

<script>

/* ================= ELEMENTS ================= */
const grid=document.getElementById("grid");
const sidebar=document.getElementById("sidebar");
const recs=document.getElementById("recs");
const loader=document.getElementById("loader");
const watch=document.getElementById("watchContainer");
const player=new Plyr("#player");
const titleEl=document.getElementById("title");
const videoInfo=document.getElementById("videoInfo");
const search=document.getElementById("search");

let currentQuery="collection:opensource_movies";

/* ================= WARNING ================= */
alert("DuroTube: Some archived content may be sensitive. Filtering is not perfect.");

/* ================= BLOCK ================= */
const block=[
 "csam","child pornography","child sexual abuse material","cp",
 "lolicon","loli","shotacon","shota",
 "rape","forced sex","non-consensual sex",
 "hurtcore","guro","snuff",
 "crush fetish","animal crush"
];

const isBlocked=t=>block.some(x=>t.toLowerCase().includes(x));

/* ================= UI ================= */
const show=()=>loader.style.display="flex";
const hide=()=>loader.style.display="none";

/* ================= API ================= */
async function fetchVideos(q){
 try{
  const r=await fetch(
   `https://archive.org/advancedsearch.php?q=${encodeURIComponent(q)}`
   +`&fl[]=identifier,title,uploader,description,creator,subject`
   +`&output=json&rows=30`
  );
  const d=await r.json();
  return d?.response?.docs||[];
 }catch{return[]}
}

async function fetchMeta(id){
 try{
  const r=await fetch(`https://archive.org/metadata/${id}`);
  return await r.json();
 }catch{return{}}
}

/* ================= FILTER ================= */
function filter(items){
 return items.filter(v=>{
  const t=`${v.title||""}${v.description||""}${v.creator||""}${v.uploader||""}`;
  return !isBlocked(t);
 });
}

/* ================= ROUTING ================= */
function route(){
 const h=decodeURIComponent(location.hash.replace("#",""));
 const p=h.split("/");

 if(!h||h==="/"){
  exitVideo();
  loadHome();
  return;
 }

 if(p[1] !== "video") exitVideo();

 if(p[1]==="video") loadVideo(p.slice(2).join("/"));
 if(p[1]==="search") loadSearch(p.slice(2).join(" "));
}

window.addEventListener("hashchange",route);

/* ================= EXIT VIDEO (IMPORTANT) ================= */
function exitVideo(){
 try{
  player.pause();
 }catch{}

 player.source=null;

 watch.style.display="none";
 sidebar.style.display="none";
 document.getElementById("app").style.display="flex";

 titleEl.textContent="";
 videoInfo.innerHTML="";
 recs.innerHTML="";
}

/* ================= HOME ================= */
async function loadHome(){
 show();

 let items=await fetchVideos(currentQuery);
 items=filter(items);

 render(items);

 hide();
}

/* ================= SEARCH ================= */
async function loadSearch(q){
 currentQuery=q||"collection:opensource_movies";
 loadHome();
}

/* ================= GRID ================= */
function render(items){
 grid.innerHTML="";

 items.forEach(v=>{
  const el=document.createElement("div");
  el.className="card";

  el.innerHTML=`
    <img class="thumb"
      src="https://archive.org/services/img/${v.identifier}">
    <div class="title">${v.title||""}</div>
    <div class="meta">${v.uploader||""}</div>
  `;

  el.onclick=()=>location.hash=`#/video/${v.identifier}`;
  grid.appendChild(el);
 });
}

/* ================= RECS ================= */
function renderRecs(items){
 recs.innerHTML="";
 items.slice(0,8).forEach(v=>{
  const el=document.createElement("div");
  el.className="recCard";

  el.innerHTML=`
    <img class="recThumb"
      src="https://archive.org/services/img/${v.identifier}">
    <div class="recTitle">${v.title||""}</div>
  `;

  el.onclick=()=>location.hash=`#/video/${v.identifier}`;
  recs.appendChild(el);
 });
}

/* ================= VIDEO ================= */
async function loadVideo(id){
 show();

 document.getElementById("app").style.display="none";
 watch.style.display="block";
 sidebar.style.display="block";

 let meta=await fetchMeta(id);
 let m=meta.metadata||{};
 let files=Array.isArray(meta.files)?meta.files:[];

 let file=files.find(f=>(f?.name||"").endsWith(".mp4"));

 if(file){
  player.source={
   type:"video",
   sources:[{
    src:`https://archive.org/download/${id}/${file.name}`,
    type:"video/mp4"
   }]
  };
 }

 titleEl.textContent=m.title||"Untitled video";

 videoInfo.innerHTML=`
  <div class="infoRow">👤 ${m.uploader||"Unknown"}</div>
  <div class="infoRow">🎬 ${m.creator||"Unknown"}</div>
  <div class="infoRow">📅 ${m.publicdate||"Unknown"}</div>
  <div class="infoRow">👁 Views: ${m.downloads||0}</div>
  <div class="desc">${m.description||"No description"}</div>
 `;

 let recData=[];
 try{
  recData=await fetchVideos(m.subject||m.creator||"movies");
  recData=filter(recData);
 }catch{}

 renderRecs(recData);

 hide();
}

/* ================= BACK ================= */
document.getElementById("back").onclick=()=>{
 location.hash="#/";
};

/* ================= SEARCH ================= */
search.addEventListener("input",e=>{
 location.hash=e.target.value
  ? `#/search/${encodeURIComponent(e.target.value)}`
  : "#/";
});

/* ================= INIT ================= */
route();

</script>

</body>
</html>
