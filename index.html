<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DuroTube</title>

<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css"/>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
}

header{
  display:flex;
  gap:10px;
  padding:12px;
  background:#181818;
  border-bottom:1px solid #222;
}

.logo{font-weight:bold}

#search{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#121212;
  color:white;
}

#app{display:flex}

#grid{
  flex:1;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  gap:12px;
  padding:12px;
}

.card{cursor:pointer}
.thumb{
  width:100%;
  aspect-ratio:16/9;
  object-fit:cover;
  border-radius:10px;
}

.title{font-size:13px;margin-top:5px}
.meta{font-size:12px;color:#aaa}

#sidebar{
  width:320px;
  background:#111;
  border-left:1px solid #222;
  padding:12px;
  display:none;
}

.recCard{margin-bottom:12px;cursor:pointer}
.recThumb{width:100%;border-radius:8px}
.recTitle{font-size:12px;margin-top:4px}
.recUploader{font-size:11px;color:#888}

#playerView{display:none;padding:12px}

video{width:100%;border-radius:10px}

#videoInfo{
  margin-top:10px;
  padding:12px;
  background:#111;
  border-radius:10px;
  font-size:13px;
}

.infoRow{color:#aaa;margin-bottom:5px}
.desc{margin-top:10px;color:#ddd}

#back{margin-top:10px;color:#3ea6ff;cursor:pointer}

#loader{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.85);
}

.spinner{
  width:48px;
  height:48px;
  border:4px solid #333;
  border-top:4px solid #3ea6ff;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{100%{transform:rotate(360deg)}}
</style>
</head>

<body>

<header>
  <div class="logo">DuroTube</div>
  <input id="search" placeholder="Search videos...">
</header>

<div id="loader">
  <div class="spinner"></div>
</div>

<div id="app">
  <div id="grid"></div>

  <div id="sidebar">
    <div style="color:#aaa;margin-bottom:10px;">Recommended</div>
    <div id="recs"></div>
  </div>
</div>

<div id="playerView">
  <video id="player" controls></video>
  <div id="videoInfo"></div>
  <div id="back">← Back</div>
</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

<script>
const grid = document.getElementById("grid");
const sidebar = document.getElementById("sidebar");
const recs = document.getElementById("recs");
const loader = document.getElementById("loader");
const playerView = document.getElementById("playerView");
const player = new Plyr("#player");
const videoInfo = document.getElementById("videoInfo");
const search = document.getElementById("search");

const show = ()=>loader.style.display="flex";
const hide = ()=>loader.style.display="none";

let currentQuery = "collection:opensource_movies";

/* ================= HASH ROUTER ================= */
function setRoute(route){
  location.hash = route;
}

function parseRoute(){
  const h = decodeURIComponent(location.hash.replace("#",""));

  if(!h || h === "/"){
    return { type:"home" };
  }

  const parts = h.split("/");

  if(parts[1] === "video"){
    return { type:"video", id: parts.slice(2).join("/") };
  }

  if(parts[1] === "search"){
    return { type:"search", q: parts.slice(2).join(" ") };
  }

  return { type:"home" };
}

/* ================= WARNING ================= */
if(!window.__warned){
  window.__warned = true;
  alert(
    "DuroTube Warning: Some archived content may be sensitive or disturbing. Filtering is applied but not perfect."
  );
}

/* ================= FILTER ================= */
const hardBlockTerms = [
  "csam","child pornography","child sexual abuse material","cp",
  "lolicon","loli","shotacon","shota",
  "rape","forced sex","non-consensual sex",
  "hurtcore","guro",
  "snuff","snuff film",
  "crush fetish","animal crush"
];

function isBlocked(text=""){
  return hardBlockTerms.some(t =>
    text.toLowerCase().includes(t)
  );
}

/* ================= API ================= */
async function fetchVideos(q){
  try {
    const url =
      `https://archive.org/advancedsearch.php?q=${encodeURIComponent(q)}`
      +`&fl[]=identifier,title,uploader,description,creator,subject`
      +`&output=json&rows=30`;

    const r = await fetch(url);
    const d = await r.json();

    return d?.response?.docs || [];
  } catch {
    return [];
  }
}

async function fetchMeta(id){
  try {
    const r = await fetch(`https://archive.org/metadata/${id}`);
    return await r.json();
  } catch {
    return {};
  }
}

/* ================= FILTER ================= */
function filter(items){
  return items.filter(v=>{
    const text = `
      ${v.title||""}
      ${v.description||""}
      ${v.creator||""}
      ${v.uploader||""}
      ${v.subject||""}
    `;
    return !isBlocked(text);
  });
}

/* ================= HOME ================= */
async function loadHome(){
  show();

  let items = await fetchVideos(currentQuery);
  items = filter(items);

  render(items);

  sidebar.style.display="none";
  playerView.style.display="none";
  document.getElementById("app").style.display="flex";

  hide();
}

/* ================= SEARCH ================= */
async function loadSearch(q){
  show();

  currentQuery = q || "collection:opensource_movies";

  let items = await fetchVideos(currentQuery);
  items = filter(items);

  render(items);

  sidebar.style.display="none";
  playerView.style.display="none";
  document.getElementById("app").style.display="flex";

  hide();
}

/* ================= GRID ================= */
function render(items){
  grid.innerHTML="";

  items.forEach(v=>{
    const el=document.createElement("div");
    el.className="card";

    el.innerHTML=`
      <img class="thumb"
        src="https://archive.org/services/img/${v.identifier}">
      <div class="title">${v.title||""}</div>
      <div class="meta">${v.uploader||""}</div>
    `;

    el.onclick=()=>{
      setRoute(`/video/${v.identifier}`);
    };

    grid.appendChild(el);
  });
}

/* ================= RECS ================= */
function renderRecs(items){
  recs.innerHTML="";

  items.slice(0,8).forEach(v=>{
    const el=document.createElement("div");
    el.className="recCard";

    el.innerHTML=`
      <img class="recThumb"
        src="https://archive.org/services/img/${v.identifier}">
      <div class="recTitle">${v.title||""}</div>
    `;

    el.onclick=()=>{
      setRoute(`/video/${v.identifier}`);
    };

    recs.appendChild(el);
  });
}

/* ================= VIDEO ================= */
async function loadVideo(id){

  show();

  document.getElementById("app").style.display="none";
  playerView.style.display="block";
  sidebar.style.display="block";

  let meta={}, m={}, files=[];

  try{
    meta = await fetchMeta(id);
    m = meta?.metadata || {};
    files = Array.isArray(meta?.files) ? meta.files : [];
  }catch{}

  const file = files.find(f =>
    (f?.name||"").toLowerCase().endsWith(".mp4")
  );

  if(file){
    player.source={
      type:"video",
      sources:[{
        src:`https://archive.org/download/${id}/${file.name}`,
        type:"video/mp4"
      }]
    };
  }

  videoInfo.innerHTML=`
    <div class="infoRow">👤 ${m.uploader||"Unknown"}</div>
    <div class="infoRow">🎬 ${m.creator||"Unknown"}</div>
    <div class="infoRow">📅 ${m.publicdate||"Unknown"}</div>
    <div class="infoRow">👁 ${m.downloads||"N/A"}</div>
    <div class="desc">${m.description||"No description"}</div>
  `;

  let recData=[];
  try{
    recData = await fetchVideos(m.subject || m.creator || "movies");
    recData = filter(recData);
  }catch{
    recData=[];
  }

  renderRecs(recData);

  hide();
}

/* ================= ROUTER ================= */
function router(){
  const r = parseRoute();

  if(r.type === "video"){
    loadVideo(r.id);
  }

  else if(r.type === "search"){
    loadSearch(r.q);
  }

  else{
    loadHome();
  }
}

window.addEventListener("hashchange", router);

/* ================= SEARCH INPUT ================= */
search.addEventListener("input",e=>{
  const q = e.target.value.trim();
  setRoute(q ? `/search/${encodeURIComponent(q)}` : "/");
});

/* ================= BACK BUTTON ================= */
document.getElementById("back").onclick=()=>{
  setRoute("/");
};

/* ================= INIT ================= */
router();

</script>

</body>
</html>
